<div class="snake-wrapper">
    <div class="snake-game-card">
        <div class="snake-header">
            <h2 class="snake-title">Snake</h2>
            <div class="snake-score-board">
                <span>Score</span>
                <span id="score-val" class="score-value">0</span>
            </div>
        </div>

        <div class="snake-canvas-container">
            <canvas id="Snake_canvas" width="400" height="400"></canvas>
            <div class="snake-overlay" id="snake-overlay">
                <button class="snake-start-btn" onclick="startGame()">Start Game</button>
            </div>
        </div>

        <div class="snake-controls">
            <div class="control-row">
                <button class="snake-dir-btn" data-key="ArrowUp" aria-label="Up">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 19V5M5 12l7-7 7 7" />
                    </svg>
                </button>
            </div>
            <div class="control-row">
                <button class="snake-dir-btn" data-key="ArrowLeft" aria-label="Left">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                </button>
                <button class="snake-dir-btn" data-key="ArrowDown" aria-label="Down">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M19 12l-7 7-7-7" />
                    </svg>
                </button>
                <button class="snake-dir-btn" data-key="ArrowRight" aria-label="Right">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<style>

        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem 1rem;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: #ffffff;
    }

    .snake-game-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 1.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        max-width: 100%;
    }

    .snake-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 0.5rem;
    }

    .snake-title {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2dfa7cff 0%, #1ebf5cc2 100%);

        display: flex;
        align-items: center;

        background: rgba(15, 23, 42, 0.6);

    .snake-canvas-container {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        background: #1e293b;
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);

    }

    canvas#Snake_canvas {
        background-color: #1e293b;
        display: block;
        max-width: 100%;

    .snake-overlay {
        position: absolute;
        inset: 0;

    .snake-start-btn:hover {

    .snake-dir-btn {

        color: white;

        align-items: center;

    .snake-dir-btn:hover {

    .snake-dir-btn:active,
    .snake-dir-btn.active {
        background: rgba(45, 250, 124, 0.2);
        border-color: #2dfa7cff;

        transform: translateY(2px);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    /* Hide controls on larger screens if desired, or keep them for alternative input */
    @media (min-width: 768px) {
        .snake-controls {
            display: none;
            /* or block to keep them */
        }

</style>

<script>
    (function () {
        const canvas = document.getElementById("Snake_canvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-val");
        const overlay = document.getElementById("snake-overlay");

        const inputQueue = [];
        const MAX_QUEUE_LENGTH = 2;
        let interval = 300;
        let baseInterval = 300;
        let grownCells = 0;
        let gameRunning = false;
        let gameLoopId = null;

        ctx.fillStyle = "blue";
        ctx.font = "16px serif";

        const grid = 10;
        let snake = [
            { x: 160, y: 160 }, // head
            { x: 150, y: 160 }, // body
            { x: 140, y: 160 }, // body
        ];
        let food = { x: 200, y: 160 };
        let score = 0;
        let dx = grid;
        let dy = 0;

        function drawRect(x, y, color, borderColor) {
            ctx.fillStyle = color;
            ctx.strokeStyle = borderColor;
            ctx.fillRect(x, y, grid, grid);
            ctx.strokeRect(x, y, grid, grid);
        }

        function getRandomInt(max) {
            return Math.floor(Math.random() * max);
        }

        let fasterInDir = 'none';

        // Desktop Key Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            if (e.key === 'ArrowUp') { fasterInDir = 'up'; e.preventDefault(); }
            else if (e.key === 'ArrowDown') { fasterInDir = 'down'; e.preventDefault(); }
            else if (e.key === 'ArrowLeft') { fasterInDir = 'left'; e.preventDefault(); }
            else if (e.key === 'ArrowRight') { fasterInDir = 'right'; e.preventDefault(); }
        });

        document.addEventListener('keyup', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                fasterInDir = 'none';
            }
        });

        // Mobile / Button Controls
        const dirBtns = document.querySelectorAll('.snake-dir-btn');

        // Simulate keyboard event behavior through UI buttons
        const triggerDir = (key, isDown) => {
            if (!gameRunning) return;

            if (isDown) {
                handleMoveInput(key);
                if (key === 'ArrowUp') fasterInDir = 'up';
                else if (key === 'ArrowDown') fasterInDir = 'down';
                else if (key === 'ArrowLeft') fasterInDir = 'left';
                else if (key === 'ArrowRight') fasterInDir = 'right';
            } else {
                fasterInDir = 'none';
            }
        };

        dirBtns.forEach(btn => {
            const key = btn.getAttribute('data-key');

            // Touch events for mobile
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                triggerDir(key, true);
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
                triggerDir(key, false);
            });

            // Mouse events for desktop testing of buttons
            btn.addEventListener('mousedown', () => {
                btn.classList.add('active');
                triggerDir(key, true);
            });
            btn.addEventListener('mouseup', () => {
                btn.classList.remove('active');
                triggerDir(key, false);
            });
            btn.addEventListener('mouseleave', () => {
                btn.classList.remove('active');
                triggerDir(key, false);
            });
        });

        // Input handling logic (extracted from keydown event listener)
        function handleMoveInput(key) {
            let referenceDx = dx;
            let referenceDy = dy;

            if (inputQueue.length > 0) {
                const lastInQueue = inputQueue[inputQueue.length - 1];
                referenceDx = lastInQueue.dx;
                referenceDy = lastInQueue.dy;
            }

            let newDx = null;
            let newDy = null;

            if (key === 'ArrowUp' && referenceDy === 0) { newDx = 0; newDy = -grid; }
            if (key === 'ArrowDown' && referenceDy === 0) { newDx = 0; newDy = grid; }
            if (key === 'ArrowLeft' && referenceDx === 0) { newDx = -grid; newDy = 0; }
            if (key === 'ArrowRight' && referenceDx === 0) { newDx = grid; newDy = 0; }

            if (newDx !== null && inputQueue.length < MAX_QUEUE_LENGTH) {
                inputQueue.push({ dx: newDx, dy: newDy });
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            handleMoveInput(e.key);
        });

        function drawGrid() {
            for (let x = 0; x < canvas.width; x += grid) {
                for (let y = 0; y < canvas.height; y += grid) {
                    if ((Math.floor(x / grid) + Math.floor(y / grid)) % 2 === 0) {
                        ctx.fillStyle = "#385776ff"; // Dark tile
                    } else {
                        ctx.fillStyle = "#4a77a8ff"; // Lighter tile
                    }
                    ctx.fillRect(x, y, grid, grid);
                }
            }
        }

        function draw() {
            drawGrid();

            for (let i = snake.length - 1; i >= 0; i--) {
                const color = i === 0 ? "#1ebf5cc2" : "#2dfa7cff";
                drawRect(snake[i].x, snake[i].y, color, "#2dfa7cff");
            }

            ctx.beginPath();
            drawRect(food.x, food.y, "#ff0000ff", "#8b0000ff");
            ctx.stroke();
        }

        function isInCollisionWithSnake(x, y, startIdx) {
            for (let i = startIdx; i < snake.length; i++) {
                if (snake[i].x === x && snake[i].y === y) return true;
            }
            return false;
        }

        function createFood() {
            let new_x, new_y;
            do {
                new_x = 10 * getRandomInt(40);
                new_y = 10 * getRandomInt(40);
            } while (isInCollisionWithSnake(new_x, new_y, 0));
            food.x = new_x;
            food.y = new_y;
        }

        function update() {
            const head = snake[0];
            let newHead = {
                x: head.x + dx,
                y: head.y + dy
            };

            if (newHead.x < 0) { newHead.x = 390 }
            else if (newHead.x >= 400) { newHead.x = 0 }
            if (newHead.y < 0) { newHead.y = 390 }
            else if (newHead.y >= 400) { newHead.y = 0 }

            snake.unshift(newHead);

            if (snake[0].x == food.x && snake[0].y == food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function hasGameEnded() {
            if (isInCollisionWithSnake(snake[0].x, snake[0].y, 4)) { return true; }
            return false;
        }

        function resetGame() {
            snake = [{ x: 160, y: 160 }, { x: 150, y: 160 }, { x: 140, y: 160 }];
            dx = grid;
            dy = 0;
            score = 0;
            inputQueue.length = 0;
            scoreElement.innerHTML = score;
            createFood();
        }

        function gameLoop() {
            if (!gameRunning) return;

            if (inputQueue.length > 0) {
                const nextMove = inputQueue.shift();
                dx = nextMove.dx;
                dy = nextMove.dy;
            }

            update();
            draw();

            if (hasGameEnded()) {
                gameRunning = false;
                overlay.classList.remove('hidden');
                overlay.querySelector('button').innerText = "Game Over! Restart";
                return;
            }

            if (dx > 0 && fasterInDir === 'right') { interval = 100; }
            else if (dx < 0 && fasterInDir === 'left') { interval = 100; }
            else if (dy > 0 && fasterInDir === 'down') { interval = 100; }
            else if (dy < 0 && fasterInDir === 'up') { interval = 100; }
            else { interval = baseInterval; }

            gameLoopId = setTimeout(gameLoop, interval);
        }

        // Export startGame to window so the button can call it
        window.startGame = function () {
            if (gameRunning) return;
            gameRunning = true;
            overlay.classList.add('hidden');
            resetGame();
            draw();
            gameLoopId = setTimeout(gameLoop, interval);
        };

        // Initial draw
        drawGrid();
        drawRect(160, 160, "#1ebf5cc2", "#2dfa7cff");
        drawRect(150, 160, "#2dfa7cff", "#2dfa7cff");
        drawRect(140, 160, "#2dfa7cff", "#2dfa7cff");

    })();
</script>
