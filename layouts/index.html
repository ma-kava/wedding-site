<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naše Svatba | Již brzy</title>
    <meta name="description" content="Svatební stránky — připravujeme.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #faf7f2 0%, #f0e9df 40%, #e8ddd0 100%);
            color: #3a3530;
            position: relative;
        }

        /* subtle animated background circles */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
            pointer-events: none;
        }

        body::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #c9a96e, transparent 70%);
            top: -200px;
            right: -150px;
            animation: float 20s ease-in-out infinite;
        }

        body::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #a0856e, transparent 70%);
            bottom: -180px;
            left: -100px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -20px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 15px) scale(0.95);
            }
        }

        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* decorative line */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
        }

        .ornament span {
            display: block;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a96e, transparent);
        }

        .ornament svg {
            width: 20px;
            height: 20px;
            fill: #c9a96e;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 0.04em;
            line-height: 1.15;
            color: #3a3530;
            margin-bottom: 0.3em;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.4s forwards;
        }

        h1 em {
            font-style: italic;
            font-weight: 300;
            color: #9a7d5a;
        }

        .subtitle {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #8a7d6d;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .message {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: 400;
            font-style: italic;
            color: #6b5e50;
            line-height: 1.6;
            max-width: 480px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.8s forwards;
        }

        .ornament-bottom {
            margin-top: 2.5rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 1s forwards;
        }

        .ornament-bottom span {
            display: inline-block;
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a96e, transparent);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* hearts icon */
        .hearts {
            display: inline-block;
            font-size: 1.2rem;
            color: #c9a96e;
            margin: 0 0.2em;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="ornament">
            <span></span>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
            <span></span>
        </div>

        <h1>Naše <em>Svatba</em></h1>

        <p class="subtitle">Připravujeme pro vás</p>

        <p class="message">
            Pracujeme na něčem krásném.<br>
            Všechny podrobnosti budou brzy k&nbsp;dispozici.
        </p>

        <div class="ornament-bottom">
            <span></span>
        </div>
    </div>
</body>

</html>
